name: Run test suite (with retry + stall watcher)
description: >
  Runs a single run_test.sh config with up to MAX_ATTEMPTS retries,
  a stall watchdog, and DTLOG_LEVEL=Info on the final attempt.

# ---------------------------------------------------------------------------
# CHANGES vs the original action -- testmon support only, additive:
#   - New inputs: `testmon` and `testmon_datafile`.
#   - When testmon=true, pytest-testmon is lazy-installed and TESTMON_DATAFILE
#     / --testmon are exported in EXACTLY the same shell block that already
#     activates .venv and cd's into TORCH_SPYRE_DIR for pytest-cov -- i.e.
#     the same place tests/run_test.sh itself actually runs from. This is
#     deliberate: a separate workflow-level "install pytest-testmon" step
#     has to independently re-derive TORCH_SPYRE_DIR and can silently land
#     in a different resolved directory than this action does (that's what
#     broke the first attempt -- pytest-testmon ended up in the wrong venv).
#     Doing it here removes that whole class of mismatch by construction.
#   - tests/run_test.sh itself is NOT modified anywhere below -- testmon is
#     activated purely via env vars pytest reads on its own.
# ---------------------------------------------------------------------------

inputs:
  torch_spyre_dir:
    description: Path to the pre-cloned torch-spyre directory
    required: false
    type: string
    default: torch-spyre
  suite_name:
    description: Human-readable label (used in echo/log output)
    required: true
  config:
    description: Path passed to run_test.sh (e.g. tests/configs/...)
    required: true
  extra_test_flags:
    description: Extra flags forwarded to run_test.sh (e.g. "-v")
    required: false
    default: ''
  max_attempts:
    description: Total number of attempts before giving up
    required: false
    default: '3'
  stall_timeout_secs:
    description: Seconds of no stdout before the test is killed as hung
    required: false
    default: '300'
  stall_check_interval:
    description: How often (seconds) the stall watcher polls
    required: false
    default: '30'
  junit_xml_path:
    description: Full path for the --junit-xml report (leave empty to skip)
    required: false
    default: ''
  report_name:
    description: Filename of the XML report (for GITHUB_ENV export to upload step)
    required: false
    default: ''
  pre_run:
    description: Optional bash snippet run at the start of every attempt (e.g. topology reset)
    required: false
    default: ''
  parallel:
    description: Whether to pass --parallel to run_test.sh (disable for distributed torchrun tests)
    required: false
    default: 'true'
  coverage_dir:
    description: >
      If set, installs pytest-cov (if missing) and writes
      coverage/<suite>_config/coverage.json under this directory.
      Leave empty to skip coverage entirely.
    required: false
    default: ''
  testmon:
    description: >
      If true, lazy-installs pytest-testmon (if missing) into the same venv
      this action activates below, and exports TESTMON_DATAFILE + appends
      --testmon to PYTEST_ADDOPTS before running. Mutually exclusive with
      coverage_dir in practice -- pytest-cov and pytest-testmon both drive
      their own coverage.py instance, so don't set both on the same call.
    required: false
    default: 'false'
  testmon_datafile:
    description: >
      Absolute path for TESTMON_DATAFILE when testmon=true. Must be an
      absolute path supplied by the caller (e.g. under $GITHUB_WORKSPACE,
      outside torch_spyre_dir) so it's immune to however torch_spyre_dir
      itself resolves on a given runner.
    required: false
    default: ''

outputs:
  suite_dir:
    description: Sanitized suite directory name derived from the config path (e.g. test_padding_config)
    value: ${{ steps.run_suite.outputs.suite_dir }}

runs:
  using: composite
  steps:
    - name: Run ${{ inputs.suite_name }}
      id: run_suite
      shell: bash
      env:
        TORCH_SPYRE_DIR: ${{ inputs.torch_spyre_dir }}
        MAX_ATTEMPTS: ${{ inputs.max_attempts }}
        STALL_TIMEOUT_SECS: ${{ inputs.stall_timeout_secs }}
        STALL_CHECK_INTERVAL: ${{ inputs.stall_check_interval }}
      run: |-
        set +e
        set +o pipefail

        source "$HOME/.bashrc"
        source /etc/profile.d/ibm-aiu-setup.sh

        [[ "$TORCH_SPYRE_DIR" != /* ]] && TORCH_SPYRE_DIR="${PWD}/${TORCH_SPYRE_DIR}"
        echo "TORCH_SPYRE_DIR $TORCH_SPYRE_DIR"
        cd "$TORCH_SPYRE_DIR" || exit 1

        source .venv/bin/activate

        CONFIG="${{ inputs.config }}"

        SUITE_DIR=$(python3 -c "
        import pathlib
        print(pathlib.Path('${CONFIG}').stem)
        ")
        echo "suite_dir=$SUITE_DIR" >> "$GITHUB_OUTPUT"

        _COV_FLAGS=""
        COV_FILE=""
        if [[ -n "${{ inputs.coverage_dir }}" ]]; then
          if ! uv pip show pytest-cov > /dev/null 2>&1; then
            echo "pytest-cov is missing! Installing now..."
            uv pip install pytest-cov
          fi

          mkdir -p "${{ inputs.coverage_dir }}/$SUITE_DIR"
          COV_FILE="${{ inputs.coverage_dir }}/$SUITE_DIR/coverage.json"
          _COV_FLAGS="--cov=torch_spyre --cov-report=json:${COV_FILE}"
          echo "  Coverage      : enabled -> ${COV_FILE}"
        fi

        # -------------------------------------------------------------------
        # testmon: installed + activated HERE, in the same cd'd/activated
        # venv used by the actual pytest invocation below -- see the header
        # note on why this can't safely live in a separate workflow step.
        #
        # Activation is done via a CLI flag appended to the actual
        # `python3 -m pytest` invocation (through run_test.sh's own "extra
        # pytest args" forwarding), NOT via PYTEST_ADDOPTS. testmon only
        # activates at all if --testmon/--testmon-forceselect is literally
        # present in pytest's argv at startup (testmon/configure.py:
        # _get_notestmon_reasons returns "not mentioned" and testmon does
        # nothing -- no collection, no db -- if neither flag is seen).
        # PYTEST_ADDOPTS has to survive: this export -> a backgrounded `&`
        # job -> `env ... bash run_test.sh` -> run_test.sh's own internal
        # subshells -> _run_pytest_isolated -> _run_cmd, before pytest ever
        # starts. Any one of those hops dropping it means silent no-op,
        # which is what was actually happening. _COV_FLAGS/_JUNIT_FLAG
        # below don't have this problem because run_test.sh forwards them
        # as literal CLI args, appended directly to every
        # `python3 -m pytest "$_base" "${_args[@]}"` call it makes -- so
        # _TESTMON_FLAGS rides along the same, already-proven path.
        #
        # --testmon-forceselect (not plain --testmon): in --parallel mode
        # run_test.sh passes explicit "file.py::TestClass::test_x" node
        # IDs per card, which testmon's own manual-selection check treats
        # as "you selected tests manually" and silently stops selecting
        # against -- forceselect prevents that. It's a strict superset of
        # plain --testmon otherwise, so always using it is safe.
        # -------------------------------------------------------------------
        _TESTMON_FLAGS=""
        if [[ "${{ inputs.testmon }}" == "true" ]]; then
          if [[ -z "${{ inputs.testmon_datafile }}" ]]; then
            echo "ERROR: testmon=true requires testmon_datafile (absolute path) to be set." >&2
            exit 1
          fi
          if ! uv pip show pytest-testmon > /dev/null 2>&1; then
            echo "pytest-testmon is missing! Installing now..."
            uv pip install pytest-testmon
          fi
          export TESTMON_DATAFILE="${{ inputs.testmon_datafile }}"
          _TESTMON_FLAGS="--testmon-forceselect"
          echo "  Testmon       : enabled -> ${TESTMON_DATAFILE}"
          echo "  Testmon flags : ${_TESTMON_FLAGS}"
        fi

        _ARCH="$(uname -m)"
        _SLOW_FLAG=""
        if [[ "$_ARCH" != "x86_64" ]]; then
          echo "Non-x86_64 platform (${_ARCH}): passing --skip-slow"
          _SLOW_FLAG="--skip-slow"
        fi

        attempt=0
        while [[ $attempt -lt $MAX_ATTEMPTS ]]; do
          attempt=$(( attempt + 1 ))
          echo "=== Attempt ${attempt}/${MAX_ATTEMPTS}: ${{ inputs.suite_name }} ==="

          LOG_FILE="$(mktemp /tmp/test_output_XXXXXX.log)"
          STALL_FLAG="$(mktemp /tmp/stall_flag_XXXXXX.tmp)"

          stall_watcher() {
            local elapsed_stall=0
            local prev_lines=0
            while [[ ! -f "${STALL_FLAG}.done" ]]; do
              sleep "$STALL_CHECK_INTERVAL"
              current_lines=$(wc -l < "$LOG_FILE" 2>/dev/null || echo 0)
              if [[ "$current_lines" -eq "$prev_lines" ]]; then
                elapsed_stall=$(( elapsed_stall + STALL_CHECK_INTERVAL ))
                echo "[stall-watcher] No new output for ${elapsed_stall}s (lines=${current_lines})"
                if [[ $elapsed_stall -ge $STALL_TIMEOUT_SECS ]]; then
                  echo "[stall-watcher] STALL DETECTED — attempting graceful shutdown first"
                  kill -TERM "$TEST_PID" 2>/dev/null || true
                  sleep 10
                  if kill -0 "$TEST_PID" 2>/dev/null; then
                    echo "[stall-watcher] Still alive after SIGTERM — force killing"
                    kill -STOP "$TEST_PID" || true
                    pkill -P "$TEST_PID" || true
                    kill -KILL "$TEST_PID" || true
                  fi
                  return
                fi
              else
                elapsed_stall=0
              fi
              prev_lines=$current_lines
            done
          }

          # Run any per-attempt setup (e.g. topology reset for multi-Spyre)
          if [[ -n '${{ inputs.pre_run }}' ]]; then
            eval '${{ inputs.pre_run }}'
          fi

          echo "Running ${{ inputs.suite_name }} tests..."
          echo "  Host Platform : ${_ARCH}"
          echo "  Slow flag     : ${_SLOW_FLAG:-none (all tests will run)}"
          echo "  Extra flags   : ${{ inputs.extra_test_flags }}"

          # From the first retry onward, enable verbose DT logging for
          # diagnostics. A retry means something already went wrong (stall,
          # hardware RAS, etc.), so every attempt after the first should be
          # at least as diagnostic as attempt 1 — not just the final one.
          _DTLOG_PREFIX=""
          if [[ $attempt -gt 1 ]]; then
            echo "  DTLOG_LEVEL   : Info (retry attempt — verbose logging enabled)"
            _DTLOG_PREFIX="DTLOG_LEVEL=Info"
          fi

          _JUNIT_FLAG=""
          if [[ -n "${{ inputs.junit_xml_path }}" ]]; then
            _JUNIT_FLAG="--junit-xml=${{ inputs.junit_xml_path }}"
          fi

          FIFO="$(mktemp -u /tmp/test_fifo_XXXXXX)"
          mkfifo "$FIFO"

          tee "$LOG_FILE" < "$FIFO" &
          TEE_PID=$!

          exec {FIFO_FD}>"$FIFO"

          _PARALLEL_FLAG=""
          if [[ "${{ inputs.parallel }}" != "false" ]]; then
            _PARALLEL_FLAG="--parallel"
          fi

          env ${_DTLOG_PREFIX} bash tests/run_test.sh "$CONFIG" ${_PARALLEL_FLAG} ${{ inputs.extra_test_flags }} ${_SLOW_FLAG} ${_JUNIT_FLAG} ${_COV_FLAGS} ${_TESTMON_FLAGS} \
            >&"$FIFO_FD" 2>&1 &
          TEST_PID=$!

          exec {FIFO_FD}>&-

          stall_watcher &
          WATCHER_PID=$!

          wait "$TEST_PID"
          TEST_EXIT=$?

          touch "${STALL_FLAG}.done"
          kill "$WATCHER_PID" 2>/dev/null || true
          wait "$WATCHER_PID" 2>/dev/null || true

          kill "$TEE_PID" 2>/dev/null || true
          wait "$TEE_PID" 2>/dev/null || true
          rm -f "$FIFO"

          if [[ $TEST_EXIT -eq 0 ]]; then
            echo "=== Attempt ${attempt} PASSED ==="
            echo "${{ inputs.suite_name }} tests done"
            if [[ "${{ inputs.testmon }}" == "true" ]]; then
              if [[ -f "${{ inputs.testmon_datafile }}" ]]; then
                echo "  Testmon db    : present -> $(ls -la "${{ inputs.testmon_datafile }}")"
              else
                echo "  Testmon db    : MISSING at ${{ inputs.testmon_datafile }} -- activation likely failed" >&2
              fi
            fi
            rm -f "$LOG_FILE" "$STALL_FLAG" "${STALL_FLAG}.done"
            exit 0
          fi

          echo "=== Attempt ${attempt} FAILED (exit=${TEST_EXIT}) ==="
          if grep -qE "ResponseTimeout|Exceeded max iterations|Fatal Python error: Aborted|LX logout" "$LOG_FILE"; then
            echo "    --> Hardware RAS timeout detected — will retry"
          else
            echo "    --> Non-hardware failure — will retry (up to ${MAX_ATTEMPTS} total)"
          fi

          rm -f "$LOG_FILE" "$STALL_FLAG" "${STALL_FLAG}.done"
          [[ $attempt -lt $MAX_ATTEMPTS ]] && sleep 10
        done
 

        echo "=== All ${MAX_ATTEMPTS} attempts failed for ${{ inputs.suite_name }} ==="
        exit 1