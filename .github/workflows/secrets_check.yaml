name: Secrets Accessibility Diagnostic

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

jobs:
  diagnose:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Display GitHub Context
        run: |
          echo "=========================================="
          echo "GitHub Event Information"
          echo "=========================================="
          echo "Event          : ${{ github.event_name }}"
          echo "Repository     : ${{ github.repository }}"
          echo "Actor          : ${{ github.actor }}"
          echo "Ref            : ${{ github.ref }}"
          echo "Head Ref       : ${{ github.head_ref }}"
          echo "Base Ref       : ${{ github.base_ref }}"
          echo ""

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Fork PR        : ${{ github.event.pull_request.head.repo.fork }}"
            echo "Head Repository: ${{ github.event.pull_request.head.repo.full_name }}"
            echo "Base Repository: ${{ github.event.pull_request.base.repo.full_name }}"
          fi

      - name: Verify Secret Accessibility
        env:
          ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}
          ARTIFACTORY_BASE_URL: ${{ secrets.ARTIFACTORY_BASE_URL }}
          ARTIFACTORY_RPM_PATH: ${{ secrets.ARTIFACTORY_RPM_PATH }}
        run: |
          echo ""
          echo "=========================================="
          echo "Checking Secret Accessibility"
          echo "=========================================="

          ERRORS=0

          check_secret () {
            NAME="$1"
            VALUE="$2"

            if [ -z "$VALUE" ]; then
              echo "❌ $NAME : NOT ACCESSIBLE"
              ERRORS=$((ERRORS+1))
            else
              echo "✅ $NAME : ACCESSIBLE"
            fi
          }

          check_secret "ARTIFACTORY_API_KEY" "$ARTIFACTORY_API_KEY"
          check_secret "ARTIFACTORY_BASE_URL" "$ARTIFACTORY_BASE_URL"
          check_secret "ARTIFACTORY_RPM_PATH" "$ARTIFACTORY_RPM_PATH"

          echo ""
          echo "=========================================="

          if [ "$ERRORS" -eq 0 ]; then
            echo "SUCCESS: All requested secrets are accessible."
          else
            echo "FAILURE: $ERRORS secret(s) are unavailable."
            echo ""
            echo "Common reasons:"
            echo "  • Workflow is running from a forked pull_request."
            echo "  • Secret names are incorrect."
            echo "  • Secrets do not exist."
            echo "  • Organization secrets are not shared with this repository."
            exit 1
          fi

      - name: Explain Result for Fork PRs
        if: github.event_name == 'pull_request'
        run: |
          echo ""
          echo "=========================================="
          echo "Fork PR Explanation"
          echo "=========================================="

          if [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            echo "This workflow is running from a FORK."
            echo ""
            echo "GitHub intentionally does NOT expose repository or"
            echo "organization secrets to pull_request workflows from forks."
            echo ""
            echo "This is expected behavior."
          else
            echo "This pull request originates from the same repository."
            echo "Repository secrets should be available if configured."
          fi