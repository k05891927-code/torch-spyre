name: Smart Tests V2

on:
  workflow_dispatch: null
  push:
    branches:
      - main
      - test/workflow-behavior
    paths:
      - torch_spyre/**/*.py
      - tests/**/*.py
      - tests/configs/**/*.yaml
      - mappings/**/*.json
      - .github/workflows/intelligent_test_selection.yaml
      - scripts/**/*.py
  pull_request:
    branches: [main]
    paths:
      - torch_spyre/**/*.py
      - tests/**/*.py
      - tests/configs/**/*.yaml
      - mappings/**/*.json
      - .github/workflows/intelligent_test_selection.yaml
      - scripts/**/*.py

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  checks: write
  pull-requests: read
  actions: read 

jobs:
  select_suites:
    name: Smart Suite Selection
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.final_selection.outputs.suites }}
      has_suites: ${{ steps.final_selection.outputs.has_suites }}
      is_first_run: ${{ steps.check_coverage.outputs.is_first_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check if coverage artifacts exist in history
        id: check_coverage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FORCE_FIRST_RUN=false
          
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_REPO="torch-spyre/torch-spyre"
            TARGET_SHA="${{ github.event.before }}"
            if [[ -z "$TARGET_SHA" || "$TARGET_SHA" == "0000000000000000000000000000000000000000" ]]; then
              FORCE_FIRST_RUN=true
            fi
          else
            TARGET_REPO="${{ github.repository }}"
            TARGET_SHA="${{ github.event.before }}"
            if [[ -z "$TARGET_SHA" || "$TARGET_SHA" == "0000000000000000000000000000000000000000" ]]; then
              TARGET_SHA=$(git rev-parse HEAD^ 2>/dev/null || echo "")
              if [[ -z "$TARGET_SHA" ]]; then
                FORCE_FIRST_RUN=true
              fi
            fi
          fi

          RUN_ID=""
          if [[ "$FORCE_FIRST_RUN" == "false" && -n "$TARGET_SHA" ]]; then
            RUN_ID=$(gh run list \
              --repo "$TARGET_REPO" \
              --workflow "intelligent_test_selection.yaml" \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha==\"$TARGET_SHA\") | .databaseId" \
              | head -n1)
          fi


          mkdir -p coverage
          if [[ -n "$RUN_ID" ]]; then
            if gh run download "$RUN_ID" --repo "$TARGET_REPO"  -D old_coverage; then
              echo "is_first_run=false" >> "$GITHUB_OUTPUT"
              
              echo "DOWNLOAD SUCCESSFUL: Listing old_coverage/ folder"
              ls -al old_coverage

            else
              echo "is_first_run=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "is_first_run=true" >> "$GITHUB_OUTPUT"
          fi

      # INITIALIZATION BLOCK (Runs only when NO baseline artifacts exist)
      - name: Action A (First Run Initialization via Matrix Parsing)
        if: steps.check_coverage.outputs.is_first_run == 'true'
        run: python3 scripts/get_all_torch_spyre_suites.py

      # MAPPING COMPILATION BLOCK =======
      - name: Rebuild Source-To-Suite Mapping File (Step B & C)
        run: python3 scripts/build_source_to_suite_mapping.py

      - name: Rebuild Test-To-Suite Config Mapping File
        run: python3 scripts/build_test_to_suite_mapping.py
      #===========

      - name: Gather Precise File Mutation Deltas
        if: steps.check_coverage.outputs.is_first_run == 'false'
        id: git_diff
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            FORK_POINT=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
            FORK_SHA=$(git rev-parse "$FORK_POINT")
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            ALL_CHANGED=$(git diff --name-only "$FORK_SHA" "$HEAD_SHA" | tr '\n' ' ')
            ONLY_ADDED=$(git diff --name-only --diff-filter=A "$FORK_SHA" "$HEAD_SHA" | tr '\n' ' ')

            echo "ALL CHANGED FILES:"
            git diff --name-only "$FORK_SHA" "$HEAD_SHA" | sed 's/^/  /'
            echo "ONLY ADDED FILES:"
            git diff --name-only --diff-filter=A "$FORK_SHA" "$HEAD_SHA" | sed 's/^/  /'

          else
            TARGET="${{ github.event.before }}"
            if [[ -z "$TARGET" || "$TARGET" == "0000000000000000000000000000000000000000" ]]; then
              TARGET="HEAD~1"
            fi
            ALL_CHANGED=$(git diff --name-only "$TARGET" HEAD | tr '\n' ' ')
            ONLY_ADDED=$(git diff --name-only --diff-filter=A "$TARGET" HEAD | tr '\n' ' ')
            FORK_POINT="$TARGET"
          fi

          echo "changed_files=$ALL_CHANGED" >> "$GITHUB_OUTPUT"
          echo "added_files=$ONLY_ADDED" >> "$GITHUB_OUTPUT"

      - name: Process Heuristic Mapping Logic
        if: steps.check_coverage.outputs.is_first_run == 'false'
        env:
          CHANGED_FILES: ${{ steps.git_diff.outputs.changed_files }}
          ADDED_FILES: ${{ steps.git_diff.outputs.added_files }}
        run: python3 scripts/apply_change_rules.py

      - name: Combine and Print Selection Output For Commits
        id: combine
        run: python3 scripts/combine_heuristics.py

      - name: Final suite selection
        id: final_selection
        run: |
          COUNT=$(cat mappings/selected_suites_by_rules.json | jq '.count')
          MATRIX_OBJS="[]"
          if [ "$COUNT" -gt 0 ]; then
             MATRIX_OBJS=$(python3 -c "
          import json, pathlib
          with open('mappings/selected_suites_by_rules.json') as f:
              data = json.load(f)
          res = []
          for cfg in data['suites']:
              p = pathlib.Path(cfg)
              name = p.stem[:-7] if p.stem.endswith('_config') else p.stem
              res.append({'name': name, 'config': cfg})
          print(json.dumps(res))
             ")
          fi
          echo "suites<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MATRIX_OBJS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -gt 0 ]; then
             echo "has_suites=true" >> "$GITHUB_OUTPUT"
          else
             echo "has_suites=false" >> "$GITHUB_OUTPUT"
          fi


  run_suites:
    name: ${{ matrix.suite.name }}
    needs: select_suites
    if: needs.select_suites.outputs.has_suites == 'true'
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 60
    env:
      CI: ''
      CLONED_TORCH_SPYRE_DIR: /home/senuser/torch-spyre
      TORCH_ROOT: ''
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.select_suites.outputs.suites) }}
    steps:

      - name: Checkout composite actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          path: torch-spyre

      - name: Clean Stale Build Cache and Artifacts
        run: |
          cd "$CLONED_TORCH_SPYRE_DIR"
          rm -rf build/ dist/ *.egg-info/ .pytest_cache/
          find . -name "*.pyc" -delete
          find . -name "__pycache__" -delete

      - name: Gather Runner Info
        uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - name: Build torch-spyre
        uses: ./.github/actions/build-torch-spyre

      - name: Run Test Suite Configuration with Coverage Logging
        run: |
          source "$HOME/.bashrc"
          unset _IBM_AIU_SETUP
          rm -rf /tmp/etc/ibm/spyre/topo.json
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_TORCH_SPYRE_DIR"

          source .venv/bin/activate

          if ! uv pip show pytest-cov > /dev/null 2>&1; then
              echo "pytest-cov is missing! Installing now..."
              uv pip install pytest-cov
          fi


          SUITE_DIR=$(python3 -c "
          import pathlib
          p = pathlib.Path('${{ matrix.suite.config }}')
          print(p.stem[:-7] if p.stem.endswith('_config') else p.stem)
          ")_config
          
          mkdir -p "coverage/$SUITE_DIR"
          bash tests/run_test.sh "tests/configs/${{ matrix.suite.config }}" -v \
            --cov=torch_spyre \
            --cov-report=json:/home/senuser/torch-spyre/coverage/$SUITE_DIR/coverage.json

      # Isolated multi-matrix uploads to avoid parallel racing overwrites
      - name: Upload segment 
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suite.name }}_config
          path: /home/senuser/torch-spyre/coverage/
          retention-days: 1
          if-no-files-found: ignore


  reupload_old_coverage:
    name: Re-upload Untouched Coverage Suites
    needs: [select_suites, run_suites]
    if: always() && needs.select_suites.outputs.is_first_run == 'false'
    runs-on: ubuntu-latest
    outputs:
      missing_suites: ${{ steps.compute_missing.outputs.missing_suites }}
      has_missing: ${{ steps.compute_missing.outputs.has_missing }}
    steps:

      - name: Download this run's fresh coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*_config"
          path: new_coverage
          merge-multiple: false

      - name: Download old coverage from previous run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_REPO="torch-spyre/torch-spyre"
            TARGET_SHA="${{ github.event.before }}"
          else
            TARGET_REPO="${{ github.repository }}"
            TARGET_SHA="${{ github.event.before }}"
          fi

          RUN_ID=$(gh run list \
            --repo "$TARGET_REPO" \
            --workflow "intelligent_test_selection.yaml" \
            --json databaseId,headSha \
            --jq ".[] | select(.headSha==\"$TARGET_SHA\") | .databaseId" \
            | head -n1)

          if [[ -n "$RUN_ID" ]]; then
            gh run download "$RUN_ID" --repo "$TARGET_REPO" -D old_coverage
            echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          else
            echo "No previous run found"
          fi

      - name: Compute missing suites and stage files
        id: compute_missing
        if: env.RUN_ID != ''
        run: |
          RAN=()
          for d in new_coverage/*/; do
            [[ -d "$d" ]] || continue
            RAN+=("$(basename "$d")")
          done
          echo "Ran this time: ${RAN[*]}"

          MISSING_JSON="[]"
          for d in old_coverage/*/; do
            [[ -d "$d" ]] || continue
            suite=$(basename "$d")

            if [[ " ${RAN[*]} " =~ " ${suite} " ]]; then
              echo "Skipping $suite (ran fresh)"
              continue
            fi

            echo "Staging missing: $suite"
            mkdir -p "staged/${suite}"
            cp -r "$d/." "staged/${suite}/"
            MISSING_JSON=$(echo "$MISSING_JSON" | jq -c --arg s "$suite" '. += [$s]')
          done

          echo "Missing suites: $MISSING_JSON"
          echo "missing_suites=$MISSING_JSON" >> "$GITHUB_OUTPUT"

          if [[ "$MISSING_JSON" == "[]" ]]; then
            echo "has_missing=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_missing=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload staged files as passthrough artifact
        if: steps.compute_missing.outputs.has_missing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: staged-missing-suites
          path: staged/
          retention-days: 1


  reupload_matrix:
    name: Reupload ${{ matrix.suite }}
    needs: reupload_old_coverage
    if: always() && needs.reupload_old_coverage.outputs.has_missing == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.reupload_old_coverage.outputs.missing_suites) }}
    steps:

      - name: Download staged missing suites
        uses: actions/download-artifact@v4
        with:
          name: staged-missing-suites
          path: staged

      - name: Upload ${{ matrix.suite }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suite }}
          path: staged/${{ matrix.suite }}/
          retention-days: 1